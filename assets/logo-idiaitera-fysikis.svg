<svg xmlns="http://www.w3.org/2000/svg" width="360" height="72" viewBox="0 0 360 72" role="img" aria-labelledby="title desc">
  <title id="title">Ιδιαίτερα Μαθήματα Φυσικής</title>
  <desc id="desc">Λογότυπο με απλό σύμβολο φυσικής και κείμενο Ιδιαίτερα Μαθήματα Φυσικής</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF7E79"/>
      <stop offset="1" stop-color="#7AD7FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect x="3" y="6" width="354" height="60" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)"/>
  <g filter="url(#shadow)">
    <circle cx="42" cy="36" r="21" fill="url(#g)" opacity="0.95"/>
    <ellipse cx="42" cy="36" rx="31" ry="9" fill="none" stroke="#fff" stroke-width="2.2" opacity="0.9" transform="rotate(-22 42 36)"/>
    <ellipse cx="42" cy="36" rx="31" ry="9" fill="none" stroke="#fff" stroke-width="2.2" opacity="0.65" transform="rotate(22 42 36)"/>
    <circle cx="42" cy="36" r="4.4" fill="#fff"/>
  </g>
  <text x="82" y="33" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#fff" letter-spacing="0.1">Ιδιαίτερα Μαθήματα</text>
  <text x="82" y="53" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#fff" letter-spacing="0.1">Φυσικής</text>
</svg>
